services:
  - type: web
    name: clickup-crm-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: sh backend/production-entrypoint.sh
    envVars:
      - key: FLASK_APP
        value: backend/app
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: DATABASE_URL
        sync: false
      - key: MIGRATION_DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: FLASK_SECRET_KEY
        sync: false
      - key: CLICKUP_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://sistema-gestao-one.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        value: https://sistema-gestao-one.vercel.app
